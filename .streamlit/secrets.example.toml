[ezadmin]
domain = "YOUR_DOMAIN"
username = "YOUR_ID"
password = "YOUR_PASSWORD"
login_url = "https://www.ezadmin.co.kr/index.html"
inventory_url = "https://ga92.ezadmin.co.kr/template35.htm?template=I100&time="

[google_sheets]
sheet_id = "YOUR_SHEET_ID"
worksheet = "daily_inventory"

[google_sheets_service_account]
type = "service_account"
project_id = "YOUR_PROJECT"
private_key_id = "YOUR_PRIVATE_KEY_ID"
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = "YOUR_SERVICE_ACCOUNT_EMAIL"
client_id = "YOUR_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/..."
universe_domain = "googleapis.com"

[poomgo]
token = "YOUR_POOMGO_TOKEN"

[coupang]
vendor_id = "A00XXXXXX"
access_key = "YOUR_COUPANG_ACCESS_KEY"
secret_key = "YOUR_COUPANG_SECRET_KEY"
# Optional: use Growth UI scraping instead of API ("growth_ui" or "rg_api")
# sales_source = "growth_ui"
# Growth dashboard URL where option sales are visible
# growth_url = "https://wing.coupang.com/..."
# Comma-separated option ids (vendorItemId) to collect from UI
# growth_option_ids = "94199205555,94199205552,90737907302,90737907295,91942294087,91942294096"
# Persistent chromium profile dir with logged-in session
